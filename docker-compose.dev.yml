services:
  db:
    image: postgres:18-alpine
    container_name: lokalinfo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lokalinfo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lokalinfo-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://172.20.10.2:3000}
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lokalinfo-network
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lokalinfo-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BACKEND_URL: http://backend:8000
      IMGBB_API_KEY: ${IMGBB_API_KEY}
    depends_on:
      - backend
    networks:
      - lokalinfo-network
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres-data:
    driver: local

networks:
  lokalinfo-network:
    driver: bridge
